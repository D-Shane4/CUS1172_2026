<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="task.css">
    <script src="./task.js"></script>


</head>

<body>
    <div class="container">
        <h1 class="text-center">Todo List</h1>

        <form id="taskForm" class="mb-3">
            <div class="form-row align-items-end">
                <div class="col-md-5">
                    <label for="taskTitle">Task</label>
                    <input type="text" id="taskTitle" name="task-title" class="form-control" placeholder="Enter a task" required>
                </div>
                <div class="col-md-3">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority" name="task-priority" class="form-control">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Status</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="task-status" id="statusPending" value="Pending" checked>
                        <label class="form-check-label" for="statusPending">Pending</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="task-status" id="statusInProgress" value="In Progress">
                        <label class="form-check-label" for="statusInProgress">In Progress</label>
                    </div>
                </div>
                <div class="col-md-1 text-right">
                    <button type="submit" class="btn btn-primary" id="submitTaskBtn">Add Task</button>
                </div>
            </div>
        </form>

        <ul class="list-group" id="taskList">
        </ul>
    </div>


</body>

</html>
